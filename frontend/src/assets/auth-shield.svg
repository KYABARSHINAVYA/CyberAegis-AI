  <path d="M260 94 388 142v108c0 112-50 191-128 236-78-45-128-124-128-236V142l128-48Z" fill="url(#innerBody)" stroke="rgba(255,255,255,0.3)" stroke-width="8"/>

  <path d="M260 130v312c57-38 88-102 88-190v-80l-88-42Z" fill="#101b31" opacity="0.85"/>
  <path d="M205 286l39 39 82-96" fill="none" stroke="#00ffcc" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M175 186h58M287 186h58M175 392h58M287 392h58" stroke="#00f0ff" stroke-width="10" stroke-linecap="round" opacity="0.65"/>
  <path d="M154 248h56M310 248h56M154 330h56M310 330h56" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.22"/>
